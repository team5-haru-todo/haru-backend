services:
  app:
    # GHCR에 올라간 이미지를 받아 실행한다. IMAGE_TAG가 없으면 배포 테스트 태그를 사용한다.
    image: ghcr.io/team5-haru-todo/haru-backend:${IMAGE_TAG:-deploy-test}
    container_name: haru-backend

    # 운영 환경변수는 EC2 서버에만 두고 Git에는 올리지 않는다.
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod

    # 현재는 EC2 내부 health check용 8080 포트를 열어둔다. 외부 공개는 보안 그룹/Nginx에서 제어한다.
    ports:
      - "8080:8080"

    # 사용자가 명시적으로 중지하지 않는 한 장애나 재부팅 후에도 다시 실행한다.
    restart: unless-stopped
