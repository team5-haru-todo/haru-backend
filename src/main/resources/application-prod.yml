spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
