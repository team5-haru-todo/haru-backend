name: Publish Backend Docker Image

on:
  # Actions 화면에서 태그를 입력해 수동으로 이미지를 발행할 수 있다.
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish
        required: true
        default: deploy-test

  # 배포 준비 브랜치에 push되면 테스트용 이미지를 자동 발행한다.
  push:
    branches:
      - feature/backend-deploy-setup

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 수동 실행이면 입력한 태그를, 브랜치 push면 deploy-test 태그를 사용한다.
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=deploy-test" >> "$GITHUB_OUTPUT"
          fi

      # Dockerfile로 이미지를 빌드하고 GHCR에 태그 2개를 함께 올린다.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
